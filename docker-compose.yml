services:
  postgres:
    image: postgres:16-alpine
    container_name: ete-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ete_user
      POSTGRES_PASSWORD: ete_password
      POSTGRES_DB: ete_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ete_user -d ete_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

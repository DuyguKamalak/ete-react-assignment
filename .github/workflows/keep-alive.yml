name: Keep backend awake

# Pings the deployed backend so Render's free tier does not spin it down.
# Set a repository variable named BACKEND_URL (Settings → Secrets and variables →
# Actions → Variables) to your Render URL, e.g. https://ete-server.onrender.com
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "${{ vars.BACKEND_URL }}" ]; then
            echo "BACKEND_URL variable not set — skipping."
            exit 0
          fi
          echo "Pinging ${{ vars.BACKEND_URL }}/api/health"
          curl -fsS "${{ vars.BACKEND_URL }}/api/health" && echo " — ok"
